<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>표지 아트 — 양산 물금 공동주택 601세대 (오리지널 SVG 황혼 렌더)</title>
<style>
  *{margin:0;padding:0;} html,body{background:#0b1119;}
  #stage{width:1600px;height:900px;overflow:hidden;}
  svg{display:block;}
</style>
</head>
<body>
<div id="stage">
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0c1119"/>
      <stop offset="0.42" stop-color="#162130"/>
      <stop offset="0.74" stop-color="#283341"/>
      <stop offset="0.88" stop-color="#4a3e30"/>
      <stop offset="1"    stop-color="#6e5634"/>
    </linearGradient>
    <radialGradient id="dusk" cx="0.7" cy="0.84" r="0.55">
      <stop offset="0" stop-color="#a07a44" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a07a44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftdark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#0a0f17" stop-opacity="0.97"/>
      <stop offset="0.32" stop-color="#0b111a" stop-opacity="0.62"/>
      <stop offset="0.56" stop-color="#0b111a" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="towA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#26333f"/>
      <stop offset="0.5" stop-color="#1b2530"/>
      <stop offset="1"   stop-color="#222e3a"/>
    </linearGradient>
    <linearGradient id="towB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#202b37"/>
      <stop offset="1"   stop-color="#161f29"/>
    </linearGradient>
    <linearGradient id="skyrefl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#5b7ea6" stop-opacity="0.20"/>
      <stop offset="1"   stop-color="#5b7ea6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c121b"/>
      <stop offset="1" stop-color="#131c26"/>
    </linearGradient>
    <linearGradient id="podium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#c89642"/>
      <stop offset="0.5" stop-color="#e8b95f"/>
      <stop offset="1"   stop-color="#a9762c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f3cb7d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f3cb7d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6c98a"/>
      <stop offset="1" stop-color="#9a7530"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- 아파트 발코니 밴드 그리드: 수평(층, 33px) 우세 + 수직(세대, 38px) -->
    <pattern id="balc" width="38" height="33" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="38" y2="0" stroke="#0a1018" stroke-width="2.6"/>
      <line x1="0" y1="2.4" x2="38" y2="2.4" stroke="#3a4d63" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="0" x2="0" y2="33" stroke="#0b121b" stroke-width="1.4"/>
    </pattern>
  </defs>

  <!-- 하늘 -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#dusk)"/>

  <!-- 원경 실루엣 -->
  <g opacity="0.4" fill="#1a232f">
    <rect x="70"  y="690" width="46" height="80"/>
    <rect x="124" y="652" width="34" height="118"/>
    <rect x="300" y="700" width="58" height="70"/>
    <rect x="356" y="672" width="30" height="98"/>
    <rect x="1500" y="676" width="52" height="94"/>
    <rect x="1556" y="700" width="44" height="70"/>
  </g>

  <!-- 지면 -->
  <rect x="0" y="770" width="1600" height="130" fill="#090e15"/>
  <rect x="0" y="770" width="1600" height="3" fill="#1c2632"/>

  <!-- ===== 아파트 타워 5동 (슬라브형 대단지) ===== -->
  <!-- 타워 정의: 각 타워는 [x, w, top] / 본체 height = 770-top -->
  <!-- Tower E (최후열, 가장 작게) x=1392 -->
  <g>
    <rect x="1392" y="372" width="150" height="398" fill="url(#towB)"/>
    <rect x="1392" y="372" width="150" height="120" fill="url(#skyrefl)"/>
    <rect x="1392" y="372" width="150" height="398" fill="url(#balc)"/>
    <rect x="1392" y="372" width="150" height="398" fill="url(#sheen)"/>
    <rect x="1392" y="372" width="150" height="4" fill="url(#goldline)" opacity="0.7"/>
    <g fill="#e6b86e">
      <rect x="1400" y="405" width="24" height="22"/><rect x="1476" y="471" width="24" height="22" fill="#f2cd8c"/>
      <rect x="1514" y="537" width="24" height="22"/><rect x="1438" y="603" width="24" height="22" fill="#e6b86e"/>
      <rect x="1400" y="669" width="24" height="22" fill="#f2cd8c"/><rect x="1514" y="405" width="24" height="22" fill="#e6b86e"/>
    </g>
  </g>

  <!-- Tower D x=1198 (중간) -->
  <g>
    <polygon points="1198,300 1198,770 1170,770 1170,330" fill="url(#sideD)"/>
    <rect x="1198" y="300" width="176" height="470" fill="url(#towA)"/>
    <rect x="1198" y="300" width="176" height="150" fill="url(#skyrefl)"/>
    <rect x="1198" y="300" width="176" height="470" fill="url(#balc)"/>
    <rect x="1198" y="300" width="176" height="470" fill="url(#sheen)"/>
    <rect x="1198" y="300" width="176" height="5" fill="url(#goldline)"/>
    <g fill="#ecc07a">
      <rect x="1206" y="333" width="24" height="22"/><rect x="1282" y="333" width="24" height="22" fill="#f2cd8c"/>
      <rect x="1320" y="399" width="24" height="22" fill="#e6b86e"/><rect x="1206" y="465" width="24" height="22" fill="#f2cd8c"/>
      <rect x="1244" y="531" width="24" height="22"/><rect x="1320" y="531" width="24" height="22" fill="#e6b86e"/>
      <rect x="1206" y="597" width="24" height="22" fill="#f2cd8c"/><rect x="1282" y="663" width="24" height="22"/>
      <rect x="1320" y="663" width="24" height="22" fill="#e6b86e"/><rect x="1244" y="399" width="24" height="22" fill="#f2cd8c"/>
    </g>
  </g>

  <!-- Tower B x=812 (최고층·전면) -->
  <g>
    <polygon points="812,232 812,770 778,770 778,266" fill="url(#sideD)"/>
    <rect x="812" y="232" width="186" height="538" fill="url(#towA)"/>
    <rect x="812" y="232" width="186" height="175" fill="url(#skyrefl)"/>
    <!-- 코어 컬럼 점등 -->
    <g fill="#f0cb86" opacity="0.95">
      <rect x="928" y="270" width="24" height="22"/><rect x="928" y="336" width="24" height="22"/>
      <rect x="928" y="402" width="24" height="22"/><rect x="928" y="468" width="24" height="22"/>
      <rect x="928" y="534" width="24" height="22"/><rect x="928" y="600" width="24" height="22"/>
      <rect x="928" y="666" width="24" height="22"/>
    </g>
    <g fill="#ecc07a">
      <rect x="820" y="270" width="24" height="22" fill="#f2cd8c"/><rect x="858" y="336" width="24" height="22"/>
      <rect x="966" y="402" width="24" height="22" fill="#e6b86e"/><rect x="820" y="468" width="24" height="22"/>
      <rect x="858" y="534" width="24" height="22" fill="#f2cd8c"/><rect x="966" y="600" width="24" height="22"/>
      <rect x="820" y="666" width="24" height="22" fill="#e6b86e"/><rect x="966" y="270" width="24" height="22" fill="#f2cd8c"/>
      <rect x="858" y="666" width="24" height="22" fill="#e6b86e"/><rect x="966" y="468" width="24" height="22" fill="#f2cd8c"/>
    </g>
    <rect x="812" y="232" width="186" height="538" fill="url(#balc)"/>
    <rect x="812" y="232" width="186" height="538" fill="url(#sheen)"/>
    <rect x="812" y="232" width="186" height="5" fill="url(#goldline)"/>
    <rect x="992" y="232" width="6" height="538" fill="url(#goldline)" opacity="0.45"/>
  </g>

  <!-- Tower C x=1018 (B 뒤편 우측) -->
  <g>
    <rect x="1018" y="352" width="150" height="418" fill="url(#towB)"/>
    <rect x="1018" y="352" width="150" height="130" fill="url(#skyrefl)"/>
    <rect x="1018" y="352" width="150" height="418" fill="url(#balc)"/>
    <rect x="1018" y="352" width="150" height="418" fill="url(#sheen)"/>
    <rect x="1018" y="352" width="150" height="4" fill="url(#goldline)" opacity="0.75"/>
    <g fill="#e6b86e">
      <rect x="1026" y="385" width="24" height="22" fill="#f2cd8c"/><rect x="1102" y="451" width="24" height="22"/>
      <rect x="1064" y="517" width="24" height="22" fill="#e6b86e"/><rect x="1140" y="583" width="24" height="22" fill="#f2cd8c"/>
      <rect x="1026" y="649" width="24" height="22"/><rect x="1140" y="385" width="24" height="22" fill="#e6b86e"/>
    </g>
  </g>

  <!-- Tower A x=632 (좌측 전면) -->
  <g>
    <rect x="632" y="328" width="158" height="442" fill="url(#towA)"/>
    <rect x="632" y="328" width="158" height="140" fill="url(#skyrefl)"/>
    <rect x="632" y="328" width="158" height="442" fill="url(#balc)"/>
    <rect x="632" y="328" width="158" height="442" fill="url(#sheen)"/>
    <rect x="632" y="328" width="158" height="5" fill="url(#goldline)" opacity="0.85"/>
    <g fill="#ecc07a">
      <rect x="640" y="361" width="24" height="22"/><rect x="716" y="361" width="24" height="22" fill="#f2cd8c"/>
      <rect x="754" y="427" width="24" height="22" fill="#e6b86e"/><rect x="640" y="493" width="24" height="22" fill="#f2cd8c"/>
      <rect x="678" y="559" width="24" height="22"/><rect x="754" y="559" width="24" height="22" fill="#e6b86e"/>
      <rect x="640" y="625" width="24" height="22" fill="#f2cd8c"/><rect x="716" y="691" width="24" height="22"/>
      <rect x="754" y="691" width="24" height="22" fill="#e6b86e"/>
    </g>
  </g>

  <!-- ===== 저층 커뮤니티·상가 포디움 ===== -->
  <ellipse cx="1000" cy="752" rx="540" ry="58" fill="url(#glow)"/>
  <rect x="612" y="712" width="942" height="58" fill="url(#podium)"/>
  <rect x="612" y="712" width="942" height="15" fill="#7c5520" opacity="0.42"/>
  <g fill="#0c1119" opacity="0.34">
    <rect x="706" y="712" width="5" height="58"/><rect x="800" y="712" width="5" height="58"/>
    <rect x="894" y="712" width="5" height="58"/><rect x="988" y="712" width="5" height="58"/>
    <rect x="1082" y="712" width="5" height="58"/><rect x="1176" y="712" width="5" height="58"/>
    <rect x="1270" y="712" width="5" height="58"/><rect x="1364" y="712" width="5" height="58"/>
    <rect x="1458" y="712" width="5" height="58"/>
  </g>
  <rect x="612" y="708" width="942" height="6" fill="#f6db9e"/>
  <rect x="612" y="704" width="942" height="4" fill="#1a2330" opacity="0.7"/>
  <rect x="612" y="773" width="942" height="28" fill="url(#podium)" opacity="0.15"/>
  <ellipse cx="1000" cy="780" rx="450" ry="13" fill="#f3cb7d" opacity="0.12"/>

  <!-- 좌측 어둠 + 시네마틱 비네트 -->
  <rect width="1600" height="900" fill="url(#leftdark)"/>
  <rect width="1600" height="140" fill="#0a0f16" opacity="0.5"/>
  <rect y="748" width="1600" height="152" fill="#0a0f16" opacity="0.4"/>
</svg>
</div>
</body>
</html>
