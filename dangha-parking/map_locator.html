<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>검단신도시 당하동 1250 — 위치도 (보고서 삽입용 정적본)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
  *{box-sizing:border-box;} html,body{margin:0;height:100%;font-family:"Pretendard","Malgun Gothic",sans-serif;color:#16233a;}
  :root{--navy:#10203b;--navy2:#1d3a66;--sky:#2f6fb0;--sky2:#5fa0dd;--red:#e0322d;--amber:#d98a0f;--green:#1f8d5b;--slate:#566377;--line:#dde4ee;}
  /* 보고서 figure 비율(가로형)로 고정 */
  #wrap{position:relative;width:1280px;height:760px;overflow:hidden;}
  #map{position:absolute;inset:0;background:#0a1320;}
  .leaflet-container{font-family:inherit;}

  .card{position:absolute;z-index:1000;background:rgba(255,255,255,.95);backdrop-filter:blur(7px);
    border:1px solid rgba(255,255,255,.6);border-radius:13px;box-shadow:0 10px 34px rgba(8,18,36,.30);}
  .title{left:18px;top:18px;padding:15px 19px 14px;max-width:360px;border-top:4px solid var(--sky);}
  .title .kick{font-size:10px;letter-spacing:3px;color:var(--sky);font-weight:800;}
  .title h1{font-size:20px;margin:5px 0 0;color:var(--navy);font-weight:800;letter-spacing:-0.5px;line-height:1.25;}
  .title .sub{font-size:11.5px;color:#5a6878;margin-top:5px;line-height:1.5;}
  .title .meta{font-size:9.5px;color:#8b97a6;margin-top:8px;border-top:1px solid var(--line);padding-top:7px;}

  .legend{left:18px;bottom:20px;padding:13px 16px;width:330px;}
  .legend h2{font-size:11.5px;margin:0 0 8px;color:var(--navy);font-weight:800;letter-spacing:.2px;}
  .lg{font-size:9px;color:#7a8696;font-weight:800;letter-spacing:.4px;margin:9px 0 4px;text-transform:uppercase;}
  .li{display:flex;align-items:flex-start;gap:8px;margin:5px 0;}
  .li .pn{flex:0 0 19px;height:19px;border-radius:50%;color:#fff;font-size:10.5px;font-weight:800;text-align:center;line-height:19px;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  .li .tx{font-size:10.8px;line-height:1.3;}
  .li .tx b{color:var(--navy);} .li .tx span{color:var(--sky);font-weight:700;}

  .pin{position:relative;}
  .pin svg{display:block;filter:drop-shadow(0 4px 5px rgba(8,18,36,.45));}
  .pin .num{position:absolute;left:0;right:0;top:6px;text-align:center;font-weight:800;font-size:13px;text-shadow:0 1px 1px rgba(0,0,0,.25);}
  .pin.big .num{font-size:15px;top:8px;}
  .halo{width:54px;height:54px;border-radius:50%;background:rgba(224,50,45,.26);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);}
  .leaflet-tooltip.nm{background:var(--navy);border:none;color:#fff;font-weight:700;font-size:11px;padding:3px 9px;border-radius:7px;box-shadow:0 4px 12px rgba(0,0,0,.3);}
  .leaflet-tooltip.nm::before{border-top-color:var(--navy);}
</style>
</head>
<body>
  <div id="wrap">
    <div id="map"></div>
    <div class="card title">
      <div class="kick">REAL ESTATE LOCATION MAP</div>
      <h1>검단신도시 당하동 1250 위치도</h1>
      <div class="sub">현장 인근 — 대상지 · 인접 검토사례 · 아라역 · 법조타운 (좌표 검증본)</div>
      <div class="meta">검토기준일 2026.06 · 좌표 추정(검증본) · 반경 500m 표시 · 베이스맵 © CARTO · OpenStreetMap</div>
    </div>
    <div class="card legend" id="legend"></div>
  </div>

<script>
// ===== 지점 정의 (아라역=37.602386,126.688074 검증좌표 앵커 · 인근 연번필지 보정) =====
// 메트로시티·iH웰카운티는 검단 내 위치 미특정(원용 벤치마크)이라 지도 핀 제외 → §4 비교사례 표에서 다룸.
const PLACES = [
  {n:"당하동 1250 (주차전용 대상지)", q:"인천광역시 서구 당하동 1250 (검단 P2-주9)", grp:"대상지", pr:"본 검토 · 블록 내 추정", color:"#e0322d", ll:[37.59190,126.71185], big:true},
  {n:"The K Tower 검단", q:"인천광역시 서구 당하동 1237", grp:"대상지", pr:"검단 C3-①-5 · 인접 검토사례", color:"#d98a0f", ll:[37.59165,126.70985]},
  {n:"선양법조타워", q:"인천광역시 서구 당하동 1235-6", grp:"비교사례(직접)", pr:"1층 계약 ~4,800만/평", color:"#2f6fb0", ll:[37.59158,126.71060]},
  {n:"아라역 (인천1호선)", q:"인천광역시 서구 당하동 1238", grp:"교통·호재", pr:"2025.6.28 개통 · OSM 검증", color:"#566377", ll:[37.592259,126.713301]},
  {n:"검단 법조타운(인천지법 북부지원)", q:"인천 서구 검단 법조타운", grp:"교통·호재", pr:"인천지법·지검 북부 · OSM 검증", color:"#1f8d5b", ll:[37.589701,126.711991]},
];

const sat = L.tileLayer('https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        {maxZoom:20, crossOrigin:true, attribution:'© CARTO · OpenStreetMap'});

const map = L.map('map',{zoomControl:false,attributionControl:true});
sat.addTo(map);
L.control.scale({imperial:false,position:'bottomright'}).addTo(map);

function pinIcon(num,color,big){
  const w=big?40:31,h=big?52:41;
  const halo = big? '<div class="halo"></div>':'';
  const svg = `<svg width="${w}" height="${h}" viewBox="0 0 30 40"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 13 23.5 14.2 24.6a1.1 1.1 0 0 0 1.6 0C17 38.5 30 25.5 30 15 30 6.7 23.3 0 15 0z" fill="${color}" stroke="#fff" stroke-width="2"/><circle cx="15" cy="15" r="6.5" fill="rgba(255,255,255,.92)"/></svg>`;
  return L.divIcon({className:'',html:`<div class="pin ${big?'big':''}">${halo}${svg}<span class="num" style="color:${color}">${num}</span></div>`,
    iconSize:[w,h],iconAnchor:[w/2,h],tooltipAnchor:[0,-h+8]});
}

const lls=[];
PLACES.forEach((p,i)=>{
  const mk=L.marker(p.ll,{icon:pinIcon(i+1,p.color,p.big)}).addTo(map);
  mk.bindTooltip(p.n,{className:'nm',direction:'top',permanent:false});
  lls.push(p.ll);
  if(p.big) L.circle(p.ll,{radius:500,color:'#e0322d',weight:1.3,dashArray:'5 5',fill:false,opacity:.75}).addTo(map);
});

function drawLegend(){
  const groups=["대상지","비교사례(직접)","교통·호재"];
  let html='<h2>범례 · 평당가</h2>';
  groups.forEach(g=>{
    html+=`<div class="lg">${g}</div>`;
    PLACES.forEach((p,i)=>{ if(p.grp!==g) return;
      html+=`<div class="li"><span class="pn" style="background:${p.color}">${i+1}</span>
        <span class="tx"><b>${p.n}</b><br><span>${p.pr}</span></span></div>`;
    });
  });
  document.getElementById('legend').innerHTML=html;
}
drawLegend();
map.fitBounds(lls,{paddingTopLeft:[300,120],paddingBottomRight:[80,120],maxZoom:16});

// 타일 로드 완료 신호(헤드리스 렌더 대기용)
let loaded=0;
sat.on('load',()=>{ window.__MAP_TILES_DONE=true; });
</script>
</body>
</html>
